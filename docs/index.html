<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Studio — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-page:#05070a;
    --bg-0:#0f1319;
    --bg-1:#161b24;
    --bg-2:#1e2530;
    --bg-3:#242c39;
    --line:#2a3240;
    --line-soft:#1f2733;
    --text-0:#e8eaed;
    --text-1:#aeb6c2;
    --text-2:#7c8494;
    --amber:#f2a93c;
    --cyan:#4fd1c5;
    --danger:#e5636b;
    --success:#34d399;
    --font-display:'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
    --font-body:'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-page);
    font-family:var(--font-body);
    color:var(--text-0);
    padding:22px;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  *:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}

  .app{
    width:100%;
    max-width:1220px;
    height:82vh;
    min-height:560px;
    background:var(--bg-0);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.7);
    display:flex;
    flex-direction:column;
  }

  .chrome-bar{
    height:34px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:8px;
    padding:0 14px;
    background:var(--bg-0);
    border-bottom:1px solid var(--line);
  }
  .chrome-dot{width:9px;height:9px;border-radius:50%;}
  .chrome-dot.r{background:#ff5f57;}
  .chrome-dot.y{background:#febc2e;}
  .chrome-dot.g{background:#28c840;}
  .chrome-url{
    margin-left:8px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-2);
    letter-spacing:.02em;
  }

  .shell{
    flex:1;
    display:flex;
    min-height:0;
  }

  /* ---------- sidebar ---------- */
  .sidebar{
    width:250px;
    flex:0 0 auto;
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    padding:18px 14px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:9px;
    padding:0 4px 16px 4px;
  }
  .brand svg{color:var(--amber);}
  .brand span{
    font-family:var(--font-display);
    font-weight:600;
    font-size:13px;
    letter-spacing:.12em;
    color:var(--text-0);
  }
  .rail-note{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--text-2);
    background:var(--bg-0);
    border:1px solid var(--line-soft);
    border-radius:8px;
    padding:6px 10px;
    margin-bottom:18px;
  }
  .agent-eyebrow{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.14em;
    color:var(--text-2);
    padding:0 6px 8px 6px;
  }
  .agent-list{display:flex; flex-direction:column; gap:6px;}
  .agent-item{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    text-align:left;
    background:transparent;
    border:1px solid transparent;
    border-radius:10px;
    padding:9px 10px;
    cursor:pointer;
    color:var(--text-1);
    transition:background .15s ease, border-color .15s ease;
  }
  .agent-item:hover{background:var(--bg-2);}
  .agent-item.active{background:var(--bg-2); border-color:var(--line);}
  .agent-item .icon{
    width:26px;height:26px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
  }
  .agent-item[data-agent="itsm"] .icon{background:rgba(79,209,197,.12); color:var(--cyan);}
  .agent-item[data-agent="fraud"] .icon{background:rgba(242,169,60,.14); color:var(--amber);}
  .agent-item .meta-col{min-width:0; flex:1;}
  .agent-item .name{
    font-size:13px; font-weight:600; color:var(--text-0);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .agent-item .sub{
    font-family:var(--font-mono);
    font-size:10.5px; color:var(--text-2); margin-top:1px;
  }
  .status-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--success); flex:0 0 auto;
    box-shadow:0 0 0 3px rgba(52,211,153,.15);
  }
  .agent-item.ghost{
    border:1px dashed var(--line);
    color:var(--text-2);
  }
  .agent-item.ghost:hover{color:var(--text-0); border-color:var(--text-2);}
  .agent-item.ghost .icon{background:transparent; border:1px dashed var(--line-soft); color:var(--text-2);}

  /* ---------- main ---------- */
  .main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .topbar{
    display:flex; align-items:center; gap:20px;
    padding:16px 26px;
    border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  .topbar-left{display:flex; align-items:center; gap:12px; min-width:0;}
  .topbar h1{
    font-family:var(--font-display);
    font-size:18px; font-weight:600; margin:0;
    white-space:nowrap;
  }
  .status-pill{
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--success); background:rgba(52,211,153,.12);
    border-radius:99px; padding:3px 9px;
  }
  .tabs{display:flex; gap:4px; margin-left:auto;}
  .tab{
    background:transparent; border:none; cursor:pointer;
    font-family:var(--font-body); font-size:13px; font-weight:500;
    color:var(--text-2);
    padding:8px 4px; border-bottom:2px solid transparent;
    margin:0 10px;
  }
  .tab.active{color:var(--text-0); border-color:var(--amber);}
  .model-badge{
    font-family:var(--font-mono); font-size:11px; color:var(--cyan);
    background:var(--bg-2); border:1px solid var(--line);
    border-radius:99px; padding:4px 11px; white-space:nowrap;
  }

  .view{flex:1; min-height:0; overflow-y:auto; padding:24px 26px;}
  .view.hidden{display:none;}

  /* ---------- configure view ---------- */
  .config-grid{display:grid; grid-template-columns:1.3fr 1fr; gap:20px; height:100%;}
  .panel{
    background:var(--bg-1); border:1px solid var(--line);
    border-radius:14px; padding:16px;
  }
  .panel > label{
    display:block; font-family:var(--font-mono); font-size:10.5px;
    letter-spacing:.1em; text-transform:uppercase; color:var(--text-2);
    margin-bottom:10px;
  }
  .prompt-panel{display:flex; flex-direction:column; min-height:340px;}
  #systemPrompt{
    flex:1; resize:none;
    background:var(--bg-0); border:1px solid var(--line-soft); border-radius:10px;
    padding:14px; color:var(--text-0); font-family:var(--font-mono);
    font-size:12.5px; line-height:1.7; min-height:300px;
  }
  #systemPrompt::placeholder{color:var(--text-2);}
  .config-side{display:flex; flex-direction:column; gap:16px;}
  select{
    width:100%; background:var(--bg-2); border:1px solid var(--line);
    border-radius:8px; padding:9px 10px; color:var(--text-0);
    font-family:var(--font-body); font-size:13px;
  }
  .tool-chips{display:flex; flex-wrap:wrap; gap:8px;}
  .tool-chips .empty-hint{font-family:var(--font-mono); font-size:11.5px; color:var(--text-2);}
  .chip{
    border:1px solid var(--line); border-radius:99px;
    background:var(--bg-0); color:var(--text-2);
    font-family:var(--font-mono); font-size:11.5px;
    padding:6px 12px; cursor:pointer; transition:all .15s ease;
  }
  .chip.on{border-color:var(--cyan); color:var(--cyan); background:rgba(79,209,197,.08);}
  .loop-row{display:flex; justify-content:space-between; gap:16px;}
  .loop-label{display:block; font-family:var(--font-mono); font-size:10px; color:var(--text-2); margin-bottom:6px;}
  .stepper{
    display:flex; align-items:center; gap:10px;
    background:var(--bg-0); border:1px solid var(--line-soft);
    border-radius:8px; padding:4px 10px; width:fit-content;
  }
  .stepper button{
    background:transparent; border:none; color:var(--text-1);
    font-family:var(--font-display); font-size:15px; cursor:pointer; width:18px;
  }
  .stepper span{font-family:var(--font-mono); font-size:13px; min-width:14px; text-align:center;}
  .save-btn{
    background:var(--amber); color:#1a1300; border:none; cursor:pointer;
    font-family:var(--font-body); font-weight:600; font-size:13px;
    padding:11px 16px; border-radius:10px; margin-top:auto;
  }
  .save-btn:hover{filter:brightness(1.08);}

  /* ---------- trace view ---------- */
  .trace-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; height:100%;}
  .chat-panel, .trace-panel{display:flex; flex-direction:column; min-height:0;}
  .chat-log{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding-right:2px;}
  .msg{
    max-width:82%; padding:10px 14px; border-radius:14px;
    font-size:13.3px; line-height:1.5;
  }
  .msg.user{align-self:flex-end; background:var(--bg-3); color:var(--text-0); border-bottom-right-radius:4px;}
  .msg.assistant{
    align-self:flex-start; background:rgba(52,211,153,.08);
    border:1px solid rgba(52,211,153,.25); color:var(--text-0);
    border-bottom-left-radius:4px;
  }
  .chat-input-row{display:flex; gap:8px; margin-top:12px;}
  #chatInput{
    flex:1; background:var(--bg-0); border:1px solid var(--line-soft);
    border-radius:10px; padding:10px 12px; color:var(--text-0);
    font-family:var(--font-body); font-size:13px;
  }
  #chatInput:disabled{opacity:.4;}
  #runBtn{
    background:var(--cyan); color:#04211e; border:none; cursor:pointer;
    font-family:var(--font-body); font-weight:600; font-size:13px;
    padding:10px 16px; border-radius:10px; white-space:nowrap;
  }
  #runBtn:disabled{opacity:.35; cursor:not-allowed;}

  .trace-panel{background:#0b0e13; padding:0; overflow:hidden;}
  .trace-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:1px solid var(--line-soft);
    font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em;
    color:var(--text-2); text-transform:uppercase; flex:0 0 auto;
  }
  .rec-dot{width:8px; height:8px; border-radius:50%; background:var(--text-2);}
  .rec-dot.live{background:var(--danger); animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,72,77,.5);} 50%{box-shadow:0 0 0 5px rgba(229,72,77,0);}}

  .trace-log{flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:9px;}
  .trace-empty{color:var(--text-2); font-family:var(--font-mono); font-size:12px; font-style:italic;}
  .step{
    border-left:3px solid var(--line);
    background:var(--bg-1); border-radius:0 8px 8px 0;
    padding:8px 12px; font-family:var(--font-mono); font-size:12px;
    line-height:1.55; opacity:0; transform:translateY(4px);
    animation:stepIn .35s ease forwards;
  }
  @keyframes stepIn{to{opacity:1; transform:translateY(0);}}
  .step .tag{display:block; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:3px;}
  .step.reasoning{border-color:var(--amber);}
  .step.reasoning .tag{color:var(--amber);}
  .step.reasoning{color:var(--text-1); font-style:italic;}
  .step.tool_call{border-color:var(--cyan);}
  .step.tool_call .tag{color:var(--cyan);}
  .step.tool_call{color:var(--text-0);}
  .step.tool_result{border-color:var(--line);}
  .step.tool_result .tag{color:var(--text-2);}
  .step.tool_result{color:var(--text-1);}
  .step.final{border-color:var(--success); background:rgba(52,211,153,.07);}
  .step.final .tag{color:var(--success);}
  .step.final{color:var(--text-0); font-family:var(--font-body); font-size:13px;}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg-2); border:1px solid var(--line); color:var(--text-0);
    font-family:var(--font-mono); font-size:12px; padding:10px 16px; border-radius:10px;
    opacity:0; pointer-events:none; transition:all .25s ease;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width:860px){
    .config-grid, .trace-grid{grid-template-columns:1fr;}
    .sidebar{width:190px;}
  }
  @media (prefers-reduced-motion:reduce){
    .step{animation:none; opacity:1; transform:none;}
    .rec-dot.live{animation:none;}
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="chrome-bar">
    <span class="chrome-dot r"></span><span class="chrome-dot y"></span><span class="chrome-dot g"></span>
    <span class="chrome-url">localhost:5173 — agent-studio</span>
  </div>

  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 12a6 6 0 1 1 2.2 4.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M3 15.5v-3h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>AGENT STUDIO</span>
      </div>
      <div class="rail-note">1 runtime engine · shared</div>

      <div class="agent-eyebrow">AGENTS</div>
      <div class="agent-list">
        <button class="agent-item active" data-agent="itsm">
          <span class="icon">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 4v12" stroke="currentColor" stroke-width="1.6" stroke-dasharray="1.6 2"/></svg>
          </span>
          <span class="meta-col">
            <span class="name">ITSM Agent</span>
            <span class="sub">6 tools · sonnet-5</span>
          </span>
          <span class="status-dot"></span>
        </button>

        <button class="agent-item" data-agent="fraud">
          <span class="icon">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 2.5l6.5 2.6v4.4c0 4.6-2.8 7.4-6.5 8.4-3.7-1-6.5-3.8-6.5-8.4V5.1L10 2.5z" stroke="currentColor" stroke-width="1.6"/></svg>
          </span>
          <span class="meta-col">
            <span class="name">Fraud Detection</span>
            <span class="sub">5 tools · sonnet-5</span>
          </span>
          <span class="status-dot"></span>
        </button>

        <button class="agent-item ghost" data-agent="new">
          <span class="icon">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </span>
          <span class="meta-col">
            <span class="name">New agent</span>
            <span class="sub">just add a config</span>
          </span>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1 id="agentName">ITSM Agent</h1>
          <span class="status-pill" id="statusPill">● active</span>
        </div>
        <nav class="tabs">
          <button class="tab active" data-tab="configure">Configure</button>
          <button class="tab" data-tab="trace">Test &amp; Trace</button>
        </nav>
        <div class="model-badge" id="modelBadge">claude-sonnet-5</div>
      </header>

      <section class="view" id="view-configure">
        <div class="config-grid">
          <div class="panel prompt-panel">
            <label>System prompt</label>
            <textarea id="systemPrompt" spellcheck="false" placeholder="e.g. You are a customer support agent for..."></textarea>
          </div>
          <div class="config-side">
            <div class="panel">
              <label>Model</label>
              <select id="modelSelect">
                <option value="claude-sonnet-5">claude-sonnet-5</option>
                <option value="claude-opus-4-8">claude-opus-4-8</option>
                <option value="claude-haiku-4-5">claude-haiku-4-5</option>
              </select>
            </div>
            <div class="panel">
              <label>Tools</label>
              <div class="tool-chips" id="toolChips"></div>
            </div>
            <div class="panel">
              <label>Loop settings</label>
              <div class="loop-row">
                <div>
                  <span class="loop-label">max_iterations</span>
                  <div class="stepper">
                    <button type="button" id="iterMinus">−</button>
                    <span id="maxIter">6</span>
                    <button type="button" id="iterPlus">+</button>
                  </div>
                </div>
                <div>
                  <span class="loop-label">stop_condition</span>
                  <select id="stopCondition">
                    <option value="no_more_tool_calls">no_more_tool_calls</option>
                    <option value="max_iterations">max_iterations</option>
                    <option value="custom_check">custom_check</option>
                  </select>
                </div>
              </div>
            </div>
            <button class="save-btn" id="saveBtn">Save config</button>
          </div>
        </div>
      </section>

      <section class="view hidden" id="view-trace">
        <div class="trace-grid">
          <div class="panel chat-panel">
            <div class="chat-log" id="chatLog"></div>
            <div class="chat-input-row">
              <input id="chatInput" type="text" readonly>
              <button id="runBtn" type="button">▶ Run demo</button>
            </div>
          </div>
          <div class="panel trace-panel">
            <div class="trace-header">
              <span>Execution trace</span>
              <span class="rec-dot" id="recDot"></span>
            </div>
            <div class="trace-log" id="traceLog">
              <div class="trace-empty">Trace will appear here once you run the agent.</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AGENTS = {
  itsm: {
    name: "ITSM Agent",
    model: "claude-sonnet-5",
    systemPrompt: "You are an internal IT service desk agent. Diagnose the issue using the tools available, resolve it directly when you can, and escalate to a human technician only when the fix needs physical hardware access or admin-level changes you're not permitted to make. Keep responses short and action-oriented.",
    tools: [
      {id:"lookup_ticket_history", on:true},
      {id:"check_system_status", on:true},
      {id:"reset_vpn_profile", on:true},
      {id:"restart_service", on:true},
      {id:"escalate_to_technician", on:true},
      {id:"close_ticket", on:false}
    ],
    maxIter: 6,
    stopCondition: "no_more_tool_calls",
    demoUser: "My laptop won't connect to the VPN since this morning's update.",
    trace: [
      {type:"reasoning", text:"Checking system status before assuming this is a local config issue."},
      {type:"tool_call", text:'check_system_status({service: "vpn-gateway"})'},
      {type:"tool_result", text:'{"status": "operational", "incident": null}'},
      {type:"reasoning", text:"Gateway is healthy, so this morning's update likely reset the local VPN profile."},
      {type:"tool_call", text:'reset_vpn_profile({user: "current_user"})'},
      {type:"tool_result", text:'{"profile_reset": true}'},
      {type:"final", text:"Your VPN profile was reset — reconnect and it should work now. If it doesn't, I'll escalate to a technician."}
    ]
  },
  fraud: {
    name: "Fraud Detection",
    model: "claude-sonnet-5",
    systemPrompt: "You are a payments fraud analyst. Investigate flagged transactions using the tools available before making a decision. Only flag an account when the risk score exceeds 80 and at least one behavioral anomaly is confirmed. Always explain the reasoning behind a flag.",
    tools: [
      {id:"check_transaction_history", on:true},
      {id:"query_risk_score", on:true},
      {id:"flag_account", on:true},
      {id:"freeze_card", on:false},
      {id:"send_compliance_alert", on:true}
    ],
    maxIter: 8,
    stopCondition: "no_more_tool_calls",
    demoUser: "Review transaction #48213 — $4,200 to a new payee, flagged by the velocity check.",
    trace: [
      {type:"reasoning", text:"Pulling recent transaction history to establish a baseline before judging this one."},
      {type:"tool_call", text:'check_transaction_history({account_id: "AC-48213"})'},
      {type:"tool_result", text:'{"avg_txn": "$180", "recent_flags": "3 txns in 10 min"}'},
      {type:"reasoning", text:"Both the amount and the velocity are well outside this account's normal pattern."},
      {type:"tool_call", text:'query_risk_score({account_id: "AC-48213"})'},
      {type:"tool_result", text:'{"risk_score": 87, "threshold": 80}'},
      {type:"reasoning", text:"Risk score clears the threshold and the anomaly is confirmed — flagging and alerting compliance."},
      {type:"tool_call", text:'flag_account({account_id: "AC-48213", reason: "velocity + amount anomaly"})'},
      {type:"tool_result", text:'{"status": "flagged"}'},
      {type:"tool_call", text:'send_compliance_alert({account_id: "AC-48213", risk_score: 87})'},
      {type:"tool_result", text:'{"alert_sent": true}'},
      {type:"final", text:"Transaction #48213 flagged — risk score 87/100 from an unfamiliar payee and a velocity spike. Compliance has been notified."}
    ]
  },
  new: {
    name: "New agent",
    model: "claude-sonnet-5",
    systemPrompt: "",
    tools: [],
    maxIter: 5,
    stopCondition: "no_more_tool_calls",
    demoUser: "",
    trace: []
  }
};

let current = "itsm";
let running = false;

const el = id => document.getElementById(id);
const agentItems = document.querySelectorAll(".agent-item");
const tabs = document.querySelectorAll(".tab");

function renderConfig(a){
  el("agentName").textContent = a.name;
  el("modelBadge").textContent = a.model;
  el("modelSelect").value = a.model;
  el("systemPrompt").value = a.systemPrompt;
  el("maxIter").textContent = a.maxIter;
  el("stopCondition").value = a.stopCondition;

  const chipWrap = el("toolChips");
  chipWrap.innerHTML = "";
  if(a.tools.length === 0){
    const hint = document.createElement("span");
    hint.className = "empty-hint";
    hint.textContent = "No tools added yet.";
    chipWrap.appendChild(hint);
  } else {
    a.tools.forEach(t => {
      const chip = document.createElement("span");
      chip.className = "chip" + (t.on ? " on" : "");
      chip.textContent = t.id;
      chip.onclick = () => { t.on = !t.on; chip.classList.toggle("on"); };
      chipWrap.appendChild(chip);
    });
  }

  const statusPill = el("statusPill");
  if(current === "new"){
    statusPill.textContent = "○ draft";
    statusPill.style.color = "var(--text-2)";
    statusPill.style.background = "var(--bg-2)";
  } else {
    statusPill.textContent = "● active";
    statusPill.style.color = "var(--success)";
    statusPill.style.background = "rgba(52,211,153,.12)";
  }
}

function resetTraceView(a){
  el("chatLog").innerHTML = "";
  el("chatInput").value = a.demoUser;
  el("traceLog").innerHTML = '<div class="trace-empty">Trace will appear here once you run the agent.</div>';
  el("recDot").classList.remove("live");
  const runBtn = el("runBtn");
  runBtn.disabled = (current === "new");
  runBtn.textContent = current === "new" ? "Configure an agent first" : "▶ Run demo";
}

function selectAgent(key){
  if(running) return;
  current = key;
  agentItems.forEach(b => b.classList.toggle("active", b.dataset.agent === key));
  renderConfig(AGENTS[key]);
  resetTraceView(AGENTS[key]);
}

agentItems.forEach(btn => btn.addEventListener("click", () => selectAgent(btn.dataset.agent)));

tabs.forEach(tab => tab.addEventListener("click", () => {
  tabs.forEach(t => t.classList.toggle("active", t === tab));
  const which = tab.dataset.tab;
  el("view-configure").classList.toggle("hidden", which !== "configure");
  el("view-trace").classList.toggle("hidden", which !== "trace");
}));

el("iterMinus").onclick = () => { const a = AGENTS[current]; a.maxIter = Math.max(1, a.maxIter - 1); el("maxIter").textContent = a.maxIter; };
el("iterPlus").onclick = () => { const a = AGENTS[current]; a.maxIter = Math.min(20, a.maxIter + 1); el("maxIter").textContent = a.maxIter; };
el("modelSelect").onchange = e => { AGENTS[current].model = e.target.value; el("modelBadge").textContent = e.target.value; };
el("stopCondition").onchange = e => { AGENTS[current].stopCondition = e.target.value; };
el("systemPrompt").oninput = e => { AGENTS[current].systemPrompt = e.target.value; };

function showToast(msg){
  const t = el("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}
el("saveBtn").onclick = () => showToast("Saved → " + current + "-agent.yaml");

function addMsg(role, text){
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  el("chatLog").appendChild(div);
  el("chatLog").scrollTop = el("chatLog").scrollHeight;
}

function addStep(step){
  const log = el("traceLog");
  const empty = log.querySelector(".trace-empty");
  if(empty) empty.remove();
  const div = document.createElement("div");
  div.className = "step " + step.type;
  const tagText = {reasoning:"reason", tool_call:"tool call", tool_result:"result", final:"final answer"}[step.type];
  div.innerHTML = '<span class="tag">' + tagText + '</span>' + step.text.replace(/</g,"&lt;");
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

el("runBtn").onclick = async () => {
  if(running || current === "new") return;
  const a = AGENTS[current];
  running = true;
  el("runBtn").disabled = true;
  el("traceLog").innerHTML = "";
  el("chatLog").innerHTML = "";
  addMsg("user", a.demoUser);
  el("recDot").classList.add("live");

  for(const step of a.trace){
    await sleep(step.type === "reasoning" ? 550 : 420);
    addStep(step);
    if(step.type === "final"){
      await sleep(300);
      addMsg("assistant", step.text);
    }
  }

  el("recDot").classList.remove("live");
  running = false;
  el("runBtn").disabled = false;
};

renderConfig(AGENTS[current]);
resetTraceView(AGENTS[current]);
</script>
</body>
</html>
